server {
    listen 80;
    server_name _;
    absolute_redirect off;
    
    root /app;
    index index.php index.html;

    # Enhanced logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    # Set real IP from proxy
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        # Security: Don't allow direct access to PHP files that don't exist
        try_files $uri =404;
        
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Preserve incoming host:port for PHP-generated absolute URLs.
        set $custom_host $http_x_forwarded_host;
        if ($custom_host = '') {
            set $custom_host $http_host;
        }
        if ($custom_host = '') {
            set $custom_host $host;
        }
        fastcgi_param HTTP_HOST $custom_host;
        
        # Pass proxy headers
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        
        include fastcgi_params;
        fastcgi_read_timeout 300;
        
        # Debugging
        fastcgi_intercept_errors on;
    }

    # Deny access to hidden files
    location ~ /\.ht {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}