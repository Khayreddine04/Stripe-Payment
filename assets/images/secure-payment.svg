<?xml version="1.0" encoding="UTF-8"?>
<svg width="400px" height="300px" viewBox="0 0 400 300" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="linearGradient-1">
            <stop stop-color="#4F46E5" offset="0%"></stop>
            <stop stop-color="#7C3AED" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="secure-payment">
            <!-- Shield Background -->
            <path d="M200,25 C280,25 340,65 340,115 C340,165 200,265 200,265 C200,265 60,165 60,115 C60,65 120,25 200,25 Z" id="shield" fill="url(#linearGradient-1)" opacity="0.1"></path>
            
            <!-- Shield Border -->
            <path d="M200,30 C275,30 330,67.5 335,115 C335,162.5 200,255 200,255 C200,255 65,162.5 65,115 C70,67.5 125,30 200,30 Z" id="shield-border" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0,0" fill="none"></path>
            
            <!-- Shield Checkmark -->
            <path d="M140,140 L170,170 L240,100" id="checkmark" stroke="#4F46E5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0,0"></path>
            
            <!-- Credit Card -->
            <rect id="card" fill="#FFFFFF" x="100" y="100" width="200" height="120" rx="8"></rect>
            <rect id="card-chip" fill="#FFD700" x="120" y="130" width="40" height="30" rx="4"></rect>
            <rect id="card-line" fill="#E5E7EB" x="120" y="175" width="160" height="10" rx="2"></rect>
            <rect id="card-line-2" fill="#E5E7EB" x="120" y="195" width="80" height="8" rx="2"></rect>
            
            <!-- Lock Icon -->
            <rect id="lock" fill="#4F46E5" x="250" y="130" width="40" height="30" rx="4"></rect>
            <rect id="lock-hole" fill="#FFFFFF" x="265" y="140" width="10" height="10" rx="2"></rect>
        </g>
    </g>
</svg>
